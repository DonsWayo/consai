name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ConsaiCore tests
    # Apple's `container` SDK requires macOS 26 / Xcode 26. CI runs only the pure
    # ConsaiCore unit tests — they need no running `container` service.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
